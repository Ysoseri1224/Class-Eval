<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>课堂评测系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .title { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
    .subtitle { font-size: 13px; opacity: 0.8; margin-bottom: 32px; }
    .status {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px 32px;
      text-align: center;
    }
    .status p { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
    .addr {
      font-size: 18px;
      font-weight: bold;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 8px;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .hint { font-size: 11px; opacity: 0.6; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="title">📚 课堂评测系统</div>
  <div class="subtitle">服务已启动，最小化到系统托盘后台运行</div>
  <div class="status">
    <p>学生在浏览器中访问：</p>
    <div class="addr">http://<span id="ip">...</span>:<span id="port">3001</span></div>
  </div>
  <div class="hint">关闭此窗口不会停止服务，右键托盘图标可退出</div>
</body>
</html>
